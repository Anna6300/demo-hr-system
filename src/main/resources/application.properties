# =============================================================================
# Quarkus Konfiguration – Demo HR System
# =============================================================================
# Quarkus nutzt MicroProfile Config: Werte können per Umgebungsvariable
# überschrieben werden (z.B. QUARKUS_DATASOURCE_JDBC_URL für CI/Prod).
# =============================================================================

# ─── Anwendungsname ───────────────────────────────────────────────────────────
quarkus.application.name=Demo HR System
quarkus.application.version=1.0.0

# ─── HTTP ─────────────────────────────────────────────────────────────────────
quarkus.http.port=8080

# ─── Datenbank: H2 In-Memory (für Entwicklung & Tests) ───────────────────────
# H2 emuliert Oracle-Syntax weitgehend. Für Produktion einfach die auskommentierten
# Oracle-Einstellungen aktivieren und H2 entfernen.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:hrdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=

# ─── Datenbank: Oracle (Produktionsbetrieb) ───────────────────────────────────
# Abhängigkeit in pom.xml: io.quarkus:quarkus-jdbc-oracle
# Auskommentiert für lokale Entwicklung ohne Oracle-Instanz.
#
# quarkus.datasource.db-kind=oracle
# quarkus.datasource.jdbc.url=jdbc:oracle:thin:@//localhost:1521/HRDB
# quarkus.datasource.username=${DB_USER}
# quarkus.datasource.password=${DB_PASSWORD}

# ─── Hibernate ORM ────────────────────────────────────────────────────────────
# drop-and-create: Schema beim Start löschen und neu anlegen (nur für Entwicklung!)
# validate:        Schema prüfen, aber nicht ändern (für Produktion empfohlen)
# update:          Schema anpassen (nicht für Produktion empfohlen)
quarkus.hibernate-orm.database.generation=drop-and-create

# import.sql wird nach dem Schema-Aufbau ausgeführt (Testdaten laden)
quarkus.hibernate-orm.sql-load-script=import.sql

# SQL-Statements im Log anzeigen (hilfreich während Entwicklung)
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true

# ─── OpenAPI / Swagger UI ─────────────────────────────────────────────────────
# Swagger UI erreichbar unter: http://localhost:8080/q/swagger-ui
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Demo HR System API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API für Mitarbeiterverwaltung – Demo

# ─── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.demo.hr".level=DEBUG

# ─── Tests: Profil "%test" überschreibt die obigen Werte ─────────────────────
# Quarkus lädt bei Tests automatisch Werte mit dem Präfix "%test."
# Separate H2-Datenbank für Tests, damit Entwicklungsdaten nicht verschmutzt werden.
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=import.sql
%test.quarkus.hibernate-orm.log.sql=false
